name: E2E (PX4 SITL)

on:
  schedule:
    # Nightly at 02:00 UTC — not on every PR due to PX4 build time
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual runs

jobs:
  e2e-px4-sitl:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── SimUAV build ──────────────────────────────────────────────────────

      - name: Install SimUAV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libeigen3-dev build-essential gcc-12 g++-12

      - name: Cache MAVLink headers
        id: cache-mavlink
        uses: actions/cache@v4
        with:
          path: third_party/mavlink-c-library
          key: mavlink-c-library-v1

      - name: Clone MAVLink headers
        if: steps.cache-mavlink.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/mavlink/c_library_v2.git third_party/mavlink-c-library

      - name: Cache CMake FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: cmake-deps-

      - name: Build SimUAV
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DBUILD_TESTS=OFF
          cmake --build build -j4

      # ── PX4 SITL ──────────────────────────────────────────────────────────

      - name: Install PX4 system dependencies
        # Matches the unconditional block in PX4 Tools/setup/ubuntu.sh plus
        # the headless-SITL subset (no Gazebo, no Java, no arm-none-eabi).
        run: |
          sudo apt-get update -y --quiet
          sudo apt-get install -y \
            build-essential cmake make \
            gcc g++ \
            python3-venv python3-dev python3-pip python3-setuptools python3-wheel \
            git wget ninja-build \
            libxml2-dev libxml2-utils xmlstarlet \
            libopencv-dev libeigen3-dev \
            bc unzip zip rsync file \
            protobuf-compiler

      - name: Cache PX4 source
        id: cache-px4
        uses: actions/cache@v4
        with:
          path: px4-autopilot
          key: px4-v1.14-${{ runner.os }}

      - name: Clone PX4 v1.14
        if: steps.cache-px4.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.14.0 \
            https://github.com/PX4/PX4-Autopilot.git px4-autopilot
          cd px4-autopilot
          git submodule update --init --recursive --depth=1

      # Use a venv to avoid PEP 668 "externally-managed-environment" errors
      # that occur with Python 3.12+ system pip.
      - name: Set up Python venv
        run: python3 -m venv .venv

      - name: Cache pip venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: pip-venv-${{ hashFiles('px4-autopilot/Tools/setup/requirements.txt') }}
          restore-keys: pip-venv-

      - name: Install PX4 Python requirements
        run: .venv/bin/pip install --upgrade pip -r px4-autopilot/Tools/setup/requirements.txt

      - name: Install pymavlink
        run: .venv/bin/pip install pymavlink

      # ── Run end-to-end test ───────────────────────────────────────────────

      - name: Run E2E test
        run: |
          .venv/bin/python3 scripts/e2e_px4_sitl.py \
            --px4-src px4-autopilot \
            --simuav ./build/simuav \
            --gps-timeout 30 \
            --arm-timeout 15
